<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Hashtag Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>AI Hashtag Generator 🚀</h1>

    <input id="textInput" type="text" placeholder="Enter your text..." />

    <div class="buttons">
      <button onclick="generateHashtags()">Generate</button>
      <button onclick="copyAll()">Copy All</button>
    </div>

    <div id="tagContainer" class="tags"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
